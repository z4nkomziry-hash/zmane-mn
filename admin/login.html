<script>
    // پاسۆردێ ئەسڵی یێ هاgenerکەری یێ SHA-256 بۆ (zimanemin2026)
    // ئەگەر پاسۆرد بهێتە نڤیسین، دێ بیتە ئەڤ کۆدە، کەس نەشێت کۆدێ ئەسڵی بزانیت.
    const ADMIN_PASSWORD_HASH = "8f37dc1d3bdfd8cebcbf561498ea76b9f87f4c9c18d363b9fbf89736e33db314"; 

    async function hashPassword(password) {
        const msgBuffer = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function checkPassword() {
        const passwordInput = document.getElementById('adminPassword').value;
        const errorMsg = document.getElementById('errorMsg');
        
        // دروستکرنا هاش بۆ پاسۆردێ هاتیە نڤیسین
        const inputHash = await hashPassword(passwordInput);
        
        if (inputHash === ADMIN_PASSWORD_HASH) {
            // دروستکرنا توکنەکا کاتی بۆ سەلماندنا چوونەژوورێ
            const adminToken = 'token_' + btoa(passwordInput) + '_' + Date.now();
            sessionStorage.setItem('admin_auth_token', adminToken);
            
            errorMsg.style.color = "#10b981";
            errorMsg.textContent = "✅ پێناسه سەرکەفتی بوو... چاڤەڕێ بە...";
            
            setTimeout(() => {
                window.location.href = 'keys.html';
            }, 1000);
        } else {
            errorMsg.style.color = "#ef4444";
            errorMsg.textContent = "❌ وشهێ نهێنی شاشە! دووبارە تاقیکەوه.";
        }
    }
</script>
