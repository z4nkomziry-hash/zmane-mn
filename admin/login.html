<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>چوونەژوور - ئادمین</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #0f172a;
            padding: 3rem;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }
        .login-box h1 {
            color: #818cf8;
            margin-bottom: 0.5rem;
        }
        .login-box p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        input {
            width: 100%;
            padding: 1rem;
            margin: 0.75rem 0;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }
        input:focus {
            border-color: #818cf8;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover {
            background: #4f46e5;
        }
        .error {
            color: #ef4444;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 ئادمین</h1>
        <p>وشهێ نهێنیێ ئادمین تێکەڤە</p>
        <input type="password" id="adminPassword" placeholder="وشهێ نهێنی">
        <button onclick="checkPassword()">چوونەژوور</button>
        <p class="error" id="errorMsg"></p>
    </div>

    <script>
        // ڤێ پاشڤە بگوهێرە! ئەڤە تەنێ نموونەیە
        const ADMIN_PASSWORD = 'zimanemin2026';
        
        function checkPassword() {
            const password = document.getElementById('adminPassword').value;
            
            if (password === ADMIN_PASSWORD) {
                // پاراستنا د سێشنێدا
                sessionStorage.setItem('adminAuth', 'true');
                // چوونە پەڕێ keys
                window.location.href = 'keys.html';
            } else {
                document.getElementById('errorMsg').textContent = '❌ وشهێ نهێنی نادروستە!';
            }
        }
    </script>
</body>
</html>
