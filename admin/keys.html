<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئادمین - دروستکرنا کودێن لایسنس | Zimanê Min</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --dark: #1e293b;
            --bg-main: #0f172a;
            --white: #ffffff;
            --gray: #64748b;
            --radius: 12px;
            --border-glass: rgba(255, 255, 255, 0.08);
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, var(--bg-main) 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 2rem;
            direction: rtl;
        }
        
        .admin-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }
        
        .admin-header .logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .logout-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #dc2626;
        }
        
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: #818cf8;
            border-bottom: 2px solid var(--border-glass);
            padding-bottom: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        
        select, input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 0.85rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn:hover {
            background: var(--primary-dark);
        }
        
        .stats-box {
            display: flex;
            justify-content: space-around;
            align-items: center;
            text-align: center;
            background: #1e293b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .stat-item h3 { font-size: 1.8rem; color: #f59e0b; }
        .stat-item p { font-size: 0.85rem; color: #94a3b8; }
        
        .key-list-box {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--border-glass);
            border-radius: 6px;
            background: #0f172a;
        }
        
        .key-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-glass);
            font-family: monospace;
            font-size: 0.95rem;
        }
        
        .key-item:last-child { border-bottom: none; }
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .badge-premium { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .badge-family { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge-lifetime { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            background: #10b981;
            color: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
            font-weight: 600;
        }
        .notification.error { background: #ef4444; }
    </style>
</head>
<body>

    <script>
        function checkAdminAuth() {
            const token = sessionStorage.getItem('admin_auth_token');
            if (!token || !token.startsWith('token_')) {
                alert('🛑 لێبوورین! تو نەشێی بێ چوونەژوور بێییە ڤی لاپەڕەی.');
                window.location.href = 'login.html';
            }
        }
        checkAdminAuth();
    </script>

    <div class="admin-container">
        <div class="admin-header">
            <button class="logout-btn" onclick="adminLogout()">🚪 لۆگۆت</button>
            <div class="logo">🔐</div>
            <h1>ڕێکخستن و دروستکرنا کلیلان</h1>
            <p>ل ڤێرێ دشێی کلیلێن نوو یێن چالاککرنێ دروست بکەی و کۆنترۆل بکەی</p>
        </div>
        
        <div class="grid-layout">
            <div class="card">
                <h2>🔑 دروستکرنا کلیلەکا نوو</h2>
                <div class="form-group">
                    <label>جۆرێ پاکێجێ</label>
                    <select id="packageType">
                        <option value="premium">💎 پرێمیۆم (Premium)</option>
                        <option value="family">👨‍👩‍👧‍👦 خێزان (Family)</option>
                        <option value="lifetime">♾️ هەروهەر (Lifetime)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ماوێ بەردەوامبوونێ (ب مانگان)</label>
                    <select id="duration">
                        <option value="1">١ مانگ</option>
                        <option value="3">٣ مانگ</option>
                        <option value="6">٦ مانگ</option>
                        <option value="12">١٢ مانگ (١ ساڵ)</option>
                        <option value="lifetime">♾️ هەمیشەیی</option>
                    </select>
                </div>
                <button class="btn" onclick="generateNewKey()">➕ دروستکە</button>
            </div>
            
            <div class="card">
                <h2>📊 دۆخێ گشتی یێ کلیلان</h2>
                <div class="stats-box">
                    <div class="stat-item">
                        <h3 id="totalKeysCount">0</h3>
                        <p>تەڤایا کلیلان</p>
                    </div>
                    <div class="stat-item">
                        <h3 id="unusedKeysCount" style="color: #10b981;">0</h3>
                        <p>کلیلێن ماین</p>
                    </div>
                </div>
                
                <h3 style="font-size: 1rem; margin-bottom: 0.5rem; color: #94a3b8;">📋 دوایین کلیلێن دروستکری:</h3>
                <div class="key-list-box" id="keyList">
                    </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // لۆگۆتکرن و ژێبرنا سێشنێ
        function adminLogout() {
            sessionStorage.removeItem('admin_auth_token');
            window.location.href = 'login.html';
        }

        // وەرگرتنی گشتی لایسنسان ژ لۆکاڵ ستۆریج
        function getAllLicenses() {
            return JSON.parse(localStorage.getItem('licenses') || '[]');
        }

        // بارکرن و پیشاندانا کلیلان ل سەر شاشێ
        function loadAdminDashboard() {
            const licenses = getAllLicenses();
            const keyList = document.getElementById('keyList');
            
            document.getElementById('totalKeysCount').textContent = licenses.length;
            
            const unused = licenses.filter(l => !l.activated);
            document.getElementById('unusedKeysCount').textContent = unused.length;
            
            // ئەگەر کلیل نەبن
            if (licenses.length === 0) {
                keyList.innerHTML = '<div style="padding:1rem; text-align:center; color:#64748b;">چ کلیل نینن</div>';
                return;
            }
            
            // نیشاندانا کلیلان (ژ نوو بۆ کۆن)
            keyList.innerHTML = licenses.reverse().map(l => `
                <div class="key-item">
                    <div>
                        <span class="badge badge-${l.package}">${getPackageEmoji(l.package)} ${getPackageName(l.package)}</span>
                        <strong style="margin-right: 8px; color: #fff;">${l.key}</strong>
                    </div>
                    <span style="font-size:0.8rem; color:${l.activated ? '#ef4444' : '#10b981'}">
                        ${l.activated ? '🔴 بەکارهاتیە' : '🟢 چالاك'}
                    </span>
                </div>
            `).join('');
        }

        // دروستکرنا کلیلا داینامیکی نوو
        function generateNewKey() {
            const packageType = document.getElementById('packageType').value;
            let duration = document.getElementById('duration').value;
            
            if (packageType === 'lifetime') {
                duration = 'lifetime';
            }
            
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let keyRandom = '';
            for (let i = 0; i < 16; i++) {
                keyRandom += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            // پارچەکرن چوار چوار
            const parts = keyRandom.match(/.{1,4}/g);
            const fullKey = `ZM-${parts.join('-')}`;
            
            const newLicense = {
                key: fullKey,
                package: packageType,
                duration: duration,
                created: new Date().toISOString(),
                activated: false,
                activatedBy: null,
                activatedAt: null
            };
            
            const licenses = getAllLicenses();
            licenses.push(newLicense);
            localStorage.setItem('licenses', JSON.stringify(licenses));
            
            showNotification(`✅ کلیل ب سەرکەفتیانە هاتە دروستکرن: ${fullKey}`);
            loadAdminDashboard();
        }

        // فەنکشنێن ئیمۆجی و ناڤان
        function getPackageEmoji(type) {
            const emojis = { premium: '💎', family: '👨‍👩‍👧‍👦', lifetime: '♾️' };
            return emojis[type] || '📦';
        }
        
        function getPackageName(type) {
            const names = { premium: 'پرێمیۆم', family: 'خێزان', lifetime: 'هەروهەر' };
            return names[type] || type;
        }

        function showNotification(message, isError = false) {
            const el = document.getElementById('notification');
            el.textContent = message;
            if (isError) el.classList.add('error'); else el.classList.remove('error');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        // ڕاکێشانا داتایان ل دەمێ بارکرنا سایتێ
        window.addEventListener('load', loadAdminDashboard);
    </script>
</body>
</html>
