        p { color: #aaa; margin-bottom: 1.5rem; }
        button { width: 100%; padding: 1.2rem; background: #e94560; color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; margin: 0.5rem 0; }
        button:active { background: #c23152; }
        .green { background: #10b981 !important; }
        .count { font-size: 3rem; font-weight: 800; color: #e94560; }
        .info { background: #0f3460; padding: 1rem; border-radius: 8px; margin: 1rem 0; }
    </style>
